name: opam pin install

# Verifies the full install chain from the git ref under test without any local
# source checkout: flatbuffers-tools (C++ flatc build) then flatbuffers (OCaml
# library + tests). Both packages are pinned to the same git ref.
# flatbuffers-tools.opam declares an extra-source for the flatbuffers C++
# archive so opam downloads it during the pre-sandbox fetch phase.

on:
  push:
  pull_request:
  workflow_dispatch:

jobs:
  versions:
    uses: ./.github/workflows/ocaml-versions.yml

  opam-pin:
    needs: versions
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]
        ocaml-compiler: ${{ fromJson(needs.versions.outputs.versions) }}
    runs-on: ${{ matrix.os }}

    steps:
      # No source checkout — opam fetches the packages directly from git.
      # For pull_request events github.sha is a synthetic merge commit that
      # does not exist as a real push; use the actual PR head SHA instead.
      - name: resolve git ref
        id: ref
        run: |
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            echo "repo=${{ github.event.pull_request.head.repo.full_name }}" >> "$GITHUB_OUTPUT"
            echo "sha=${{ github.event.pull_request.head.sha }}"            >> "$GITHUB_OUTPUT"
          else
            echo "repo=${{ github.repository }}" >> "$GITHUB_OUTPUT"
            echo "sha=${{ github.sha }}"          >> "$GITHUB_OUTPUT"
          fi

      - uses: ocaml/setup-ocaml@v3
        with:
          ocaml-compiler: ${{ matrix.ocaml-compiler }}

      - name: pin packages from git ref
        run: |
          opam pin add flatbuffers \
            "git+https://github.com/${{ steps.ref.outputs.repo }}.git#${{ steps.ref.outputs.sha }}" \
            --no-action -y
          opam pin add flatbuffers-tools \
            "git+https://github.com/${{ steps.ref.outputs.repo }}.git#${{ steps.ref.outputs.sha }}" \
            --no-action -y

      - name: install flatbuffers-tools deps
        run: opam install flatbuffers-tools --deps-only -y

      - name: install flatbuffers-tools
        run: opam install flatbuffers-tools -y

      - name: verify flatc
        run: opam exec -- flatc.ocaml --version

      - name: install flatbuffers deps
        run: opam install flatbuffers --deps-only --with-test -y

      - name: install flatbuffers
        run: opam install flatbuffers --with-test -y
