name: OCaml Build

on:
  push:
  pull_request:
  workflow_dispatch:

jobs:
  versions:
    uses: ./.github/workflows/ocaml-versions.yml
  build:
    needs: versions
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-24.04, ubuntu-24.04-arm]
        ocaml_version: ${{ fromJson(needs.versions.outputs.versions) }}
    steps:
    - name: checkout
      uses: actions/checkout@v6
      with:
        submodules: true
    - name: devcontainer
      uses: ./.github/workflows/actions/devcontainer
      id: devcontainer
      env:
        OCAML_VERSION: ${{ matrix.ocaml_version }}
      with:
        variant: ${{ matrix.ocaml_version }}
    - name: setup
      run: |
        echo 'EXEC=${{ steps.devcontainer.outputs.exec }}' >> $GITHUB_ENV
    - name: info
      run: |
        ${{ env.EXEC }} sh -c 'uname -m && opam exec -- ocaml --version'
    - name: build flatc
      run: |
        ${{ env.EXEC }} make flatc
    - name: install ocaml deps
      run: |
        ${{ env.EXEC }} bash -c '. /etc/bash.bashrc && sudo OPAMROOT=$OPAMROOT make deps'
    - name: test
      run: |
        ${{ env.EXEC }} make test
    - name: test jsoo
      run: |
        ${{ env.EXEC }} make test-jsoo
    - name: test melange
      run: |
        ${{ env.EXEC }} make test-melange
    - name: benchmark
      run: |
        ${{ env.EXEC }} make bench
    - name: generate-check
      run: |
        ${{ env.EXEC }} make generate-check
    - name: check tree is clean
      run: |
        if ! git diff --quiet -- . ':!flatbuffers'; then
          echo "::error::Source tree was modified during build/test"
          git diff --stat -- . ':!flatbuffers'
          exit 1
        fi
        if [ -n "$(git ls-files --others --exclude-standard -- . ':!flatbuffers')" ]; then
          echo "::error::Untracked files appeared during build/test"
          git ls-files --others --exclude-standard -- . ':!flatbuffers'
          exit 1
        fi
