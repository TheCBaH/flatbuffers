name: OCaml Build

on:
  push:
  pull_request:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
    - name: checkout
      uses: actions/checkout@v4
      with:
        submodules: true
    - name: devcontainer
      uses: ./.github/workflows/actions/devcontainer
      id: devcontainer
    - name: setup
      run: |
        echo 'EXEC=${{ steps.devcontainer.outputs.exec }}' >> $GITHUB_ENV
    - name: fix opam permissions
      run: |
        ${{ env.EXEC }} bash -c '. /etc/bash.bashrc && sudo chown -R $(id -u):$(id -g) ${OPAMROOT}'
    - name: build flatc
      run: |
        ${{ env.EXEC }} make flatc
    - name: install ocaml deps
      run: |
        ${{ env.EXEC }} make deps
    - name: test
      run: |
        ${{ env.EXEC }} make test
    - name: benchmark
      run: |
        ${{ env.EXEC }} make bench
