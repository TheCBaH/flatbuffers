name: OCaml Build

on:
  push:
  pull_request:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
    - name: checkout
      uses: actions/checkout@v6
      with:
        submodules: true
    - name: devcontainer
      uses: ./.github/workflows/actions/devcontainer
      id: devcontainer
    - name: setup
      run: |
        echo 'EXEC=${{ steps.devcontainer.outputs.exec }}' >> $GITHUB_ENV
    - name: build flatc
      run: |
        ${{ env.EXEC }} make flatc
    - name: install ocaml deps
      run: |
        ${{ env.EXEC }} bash -c '. /etc/bash.bashrc && sudo OPAMROOT=$OPAMROOT make deps'
    - name: test
      run: |
        ${{ env.EXEC }} make test
    - name: benchmark
      run: |
        ${{ env.EXEC }} make bench
    - name: generate-check
      run: |
        ${{ env.EXEC }} make generate-check
    - name: check tree is clean
      run: |
        if ! git diff --quiet -- . ':!flatbuffers'; then
          echo "::error::Source tree was modified during build/test"
          git diff --stat -- . ':!flatbuffers'
          exit 1
        fi
        if [ -n "$(git ls-files --others --exclude-standard -- . ':!flatbuffers')" ]; then
          echo "::error::Untracked files appeared during build/test"
          git ls-files --others --exclude-standard -- . ':!flatbuffers'
          exit 1
        fi
